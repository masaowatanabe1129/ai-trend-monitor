<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AI Trend Monitor</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
margin:40px;
}

h1{
font-size:32px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.article{
margin-bottom:10px;
}

a{
color:#60a5fa;
text-decoration:none;
}

pre{
white-space:pre-wrap;
}
</style>

</head>

<body>

<h1>AI Trend Monitor</h1>

<div class="card">
<h2>Today's AI Landscape</h2>
<pre id="trend"></pre>
</div>

<div class="card">
<h2>Source Articles</h2>
<div id="articles"></div>
</div>

<script>

fetch("data/trend_summary.txt")
.then(r=>r.text())
.then(t=>{
document.getElementById("trend").textContent=t
})

fetch("data/latest.json")
.then(r=>r.json())
.then(data=>{

const container=document.getElementById("articles")

data.forEach(a=>{

const div=document.createElement("div")

div.className="article"

div.innerHTML=`<a href="${a.link}" target="_blank">${a.title}</a>`

container.appendChild(div)

})

})

</script>

</body>
</html>
